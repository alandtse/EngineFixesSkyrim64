name: Build

on:
  workflow_call:
    inputs:
      version:
        description: 'Version string to validate against the built binary (optional)'
        type: string
        required: false
        default: ''
      upload-artifact:
        description: 'Whether to upload the packaged artifact'
        type: boolean
        required: false
        default: false
      ref:
        description: 'Git ref to checkout'
        type: string
        required: false
        default: ''
    outputs:
      artifact-name:
        description: 'Name of the uploaded artifact'
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build on Windows
    # windows-2025 ships Visual Studio 2026, matching the vs2026-windows-vcpkg
    # preset's generator/toolset and the toolset CommonLibVR's prebuilt release
    # bundles are built with.
    runs-on: windows-2025
    if: github.repository_owner == 'alandtse'
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          ref: ${{ inputs.ref || github.sha }}
          persist-credentials: false

      - name: Extract vcpkg baseline from vcpkg.json
        id: vcpkg_baseline
        shell: pwsh
        run: |
          $vcpkgJson = Get-Content vcpkg.json | ConvertFrom-Json
          $baseline = $vcpkgJson.'builtin-baseline'
          echo "baseline=$baseline" >> $env:GITHUB_OUTPUT
          echo "Using vcpkg baseline: $baseline"

      - uses: lukka/get-cmake@591817e96fcad43505fb4eae36172462abb3a42e # v4.3.3

      - name: Restore vcpkg artifacts
        uses: lukka/run-vcpkg@b1a0dd252f06b9e25b3c022a9a03bd7a427fb6a2 # v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/b/vcpkg"
          vcpkgGitCommitId: "${{ steps.vcpkg_baseline.outputs.baseline }}"
          vcpkgJsonGlob: "vcpkg.json"

      # x-gha reads the Actions cache endpoint from these two variables, which GitHub
      # only exposes to the github-script runtime — re-export them so vcpkg sees them.
      - name: Enable vcpkg GitHub Actions binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Build
        uses: lukka/run-cmake@5d55ea7949e25f69f0ecb516d8d572297e03a956 # v10
        with:
          cmakeListsTxtPath: "${{ github.workspace }}/CMakeLists.txt"
          configurePreset: vs2026-windows-vcpkg
          buildPreset: release

      - name: Extract and validate version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content CMakeLists.txt -Raw
          if ($content -match 'set\(VERSION\s+([0-9]+\.[0-9]+\.[0-9]+)') {
            $built = $matches[1]
          } else {
            Write-Error "VERSION not found in CMakeLists.txt"
            exit 1
          }
          $input_ver = "${{ inputs.version }}"
          if ($input_ver -ne "" -and $input_ver -ne $built) {
            Write-Error "Input version $input_ver does not match built version $built"
            exit 1
          }
          echo "version=$built" >> $env:GITHUB_OUTPUT
          echo "Built version: $built"

      - name: Package artifact
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $artifactName = "EngineFixes_$version"
          $pluginsDir = "package/SKSE/Plugins"
          New-Item -ItemType Directory -Path $pluginsDir -Force
          Copy-Item "build/Release/EngineFixes.dll" "$pluginsDir/"
          Copy-Item "build/Release/EngineFixes.pdb" "$pluginsDir/"
          Copy-Item "Skyrim/Data/SKSE/Plugins/EngineFixes.toml" "$pluginsDir/"
          Copy-Item "Skyrim/Data/SKSE/Plugins/EngineFixes_SNCT.ini" "$pluginsDir/"
          Copy-Item "Skyrim/Data/SKSE/Plugins/EngineFixes_preload.txt" "$pluginsDir/"
          7z a "$artifactName.7z" ".\package\SKSE"
          echo "artifact-name=$artifactName" >> $env:GITHUB_OUTPUT

      - name: Upload artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.package.outputs.artifact-name }}
          path: ${{ steps.package.outputs.artifact-name }}.7z
          if-no-files-found: error

    outputs:
      artifact-name: ${{ steps.package.outputs.artifact-name }}
