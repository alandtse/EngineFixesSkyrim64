name: PR Test Build

on:
  pull_request:
    paths:
      # Source files
      - 'src/**/*.cpp'
      - 'src/**/*.h'
      - 'src/**/*.hpp'
      # Build configuration
      - 'CMakeLists.txt'
      - 'cmake/**'
      - 'CMakePresets.json'
      # Dependencies
      - 'vcpkg.json'
      - '.gitmodules'
      - 'extern/**'
      # CI workflows that affect the build
      - '.github/workflows/build-reusable.yml'
      - '.github/workflows/pr-test.yml'

jobs:
  test-build:
    name: Test Build
    # Reuse the same build workflow that release.yml calls (DRY); just don't package/upload.
    uses: ./.github/workflows/build-reusable.yml
    with:
      upload-artifact: false
